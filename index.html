<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Money — Household</title>
<!-- PWA / Add-to-Home-Screen -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<style>
:root{color-scheme:light;
 --tp:#1c1c1a;--ts:#56554f;--tm:#8c8b83;--s2:#fff;--s1:#f6f5f1;--s0:#e9e7e0;
 --bd:rgba(0,0,0,.10);--bds:rgba(0,0,0,.22);--acc:#2a78d6;--bgacc:#e6f1fb;--tacc:#185fa5;
 --bgw:#faeeda;--tw:#854f0b;--tsu:#0f6e56;--td:#a32d2d;}
*{box-sizing:border-box}
body{margin:0;background:#fff;color:var(--tp);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:15px;line-height:1.4;}
.wrap{max-width:720px;margin:0 auto;padding:0 18px 40px;}
button{font-family:inherit;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
<div style="padding:1rem 0 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
  <div><div style="font-size:19px;font-weight:600;">Money — household</div><div style="display:flex;align-items:center;gap:8px;"><div id="live" style="font-size:12px;color:var(--ts);">snapshot</div><button onclick="refreshData()" title="Re-pull the latest published data" style="border:0;background:transparent;color:var(--acc);font-size:14px;line-height:1;cursor:pointer;padding:0;">⟳</button></div></div>
  <div style="display:flex;border:0.5px solid var(--bds);border-radius:8px;overflow:hidden;">
    <button id="cu" onclick="setCur('usd')" style="border:0;background:transparent;color:var(--ts);padding:6px 12px;font-size:12px;">USD</button>
    <button id="ct" onclick="setCur('thb')" style="border:0;background:var(--tp);color:var(--s2);padding:6px 12px;font-size:12px;">฿ THB</button>
  </div>
</div>
<div id="nav" style="display:flex;gap:6px;margin:0.9rem 0 1rem;flex-wrap:wrap;"></div>
<div id="view"></div>
</div>
<script>
const BAKED={"as_of":"","fx":{},"accounts":[],"accounts_total":0,"locked":[],"balance_sheet":[],"rollup":[],"upcoming":[],"budget":[],"last10":[],"forecast":[],"loans":[],"fx_rate":33};
let DATA=BAKED,cur='thb',tab='overview',per='month';
const HC={G:'#1D9E75',Y:'#BA7517',R:'#A32D2D',GR:'#888780',MED:'#BA7517',HIGH:'#A32D2D',LOW:'#1D9E75',DONE:'#888780'};
function FX(){return DATA.fx_rate||33;}
function f(u){if(u==null)return'';u=Math.round(u);return cur==='usd'?(u<0?'-$'+Math.abs(u).toLocaleString():'$'+u.toLocaleString()):'฿'+(u*FX()).toLocaleString();}
function dot(c){return '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+(HC[c]||c)+';margin-right:2px;"></span>';}
const tabs=[['overview','Overview'],['budget','Budget'],['fx','FX'],['forecast','Forecast'],['loans','Loans']];
function setCur(c){cur=c;document.getElementById('cu').style.background=c==='usd'?'var(--tp)':'transparent';document.getElementById('cu').style.color=c==='usd'?'var(--s2)':'var(--ts)';document.getElementById('ct').style.background=c==='thb'?'var(--tp)':'transparent';document.getElementById('ct').style.color=c==='thb'?'var(--s2)':'var(--ts)';render();}
function setTab(t){tab=t;drawNav();render();}
function setPer(p){per=p;render();}
function drawNav(){document.getElementById('nav').innerHTML=tabs.map(t=>'<button onclick="setTab(\''+t[0]+'\')" style="border:0.5px solid '+(tab===t[0]?'var(--acc)':'var(--bd)')+';background:'+(tab===t[0]?'var(--bgacc)':'transparent')+';color:'+(tab===t[0]?'var(--tacc)':'var(--ts)')+';padding:6px 13px;border-radius:8px;font-size:13px;">'+t[1]+'</button>').join('');}
function hd(t){return '<div style="font-size:13px;font-weight:600;color:var(--ts);margin:1.1rem 0 6px;">'+t+'</div>';}
function ov(){
 let h=hd('Where the money is');
 DATA.accounts.forEach(a=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span>'+dot(a.health)+a.name+'</span><span style="text-align:right;"><span style="font-weight:600;">'+f(a.usd)+'</span> <span style="font-size:11px;color:var(--tm);">'+a.note+'</span></span></div>';});
 h+='<div style="display:flex;justify-content:space-between;padding:7px 0;font-size:14px;font-weight:600;border-bottom:0.5px solid var(--tp);"><span>Total in accounts</span><span>'+f(DATA.accounts_total)+'</span></div>';
 h+=hd('But almost none of it is spending money');
 const tot=DATA.locked.reduce((s,l)=>s+l.usd,0);
 h+='<div style="display:flex;height:24px;border-radius:6px;overflow:hidden;gap:2px;background:var(--s0);">'+DATA.locked.map(l=>'<div style="width:'+(l.usd/tot*100).toFixed(1)+'%;background:'+l.color+';"></div>').join('')+'</div><div style="margin-top:8px;">';
 DATA.locked.forEach(l=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span>'+dot(l.health)+'<span style="width:9px;height:9px;display:inline-block;border-radius:2px;background:'+l.color+';margin-right:4px;"></span>'+l.label+'</span><span style="font-weight:600;">'+f(l.usd)+'</span></div>';});
 h+='</div>'+hd('Quick balance sheet');
 DATA.balance_sheet.forEach(b=>{const bold=b.label.charAt(0)==='='?'600':'400';h+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span style="font-weight:'+bold+';">'+dot(b.health)+b.label+'</span><span style="font-weight:'+bold+';color:'+(b.usd<0?'var(--td)':'var(--tp)')+';">'+f(b.usd)+'</span></div>';});
 h+=hd('How are we doing');
 h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+DATA.rollup.map(r=>'<div style="background:var(--s1);border-radius:8px;padding:9px 11px;"><div style="font-size:12px;color:var(--ts);">'+dot(r.health)+r.label+'</div><div style="font-size:11px;color:var(--tm);margin-top:2px;">'+r.note+'</div></div>').join('')+'</div>';
 h+=hd('Coming up — next big money events');
 DATA.upcoming.forEach(u=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span>'+dot(u.health)+'<b style="font-weight:600;">'+u.date+'</b> '+u.label+'</span><span style="text-align:right;"><span style="font-weight:600;color:'+(u.usd<0?'var(--td)':'var(--tsu)')+';">'+(u.usd<0?'-':'+')+f(Math.abs(u.usd))+'</span> <span style="font-size:11px;color:var(--tm);">'+u.note+'</span></span></div>';});
 return h;
}
var REALLOC={},RLOG=[],pendR=null;
function bAvail(c){if(c.type==='flex')return Math.max(0,(c.mo-(c.mo_spent||0)))+(REALLOC[c.name]||0);if(c.type==='save')return (c.mo*6)+(REALLOC[c.name]||0);return null;}
function ds(e){e.dataTransfer.setData('text',e.currentTarget.getAttribute('data-n'));}
function dpv(e){e.preventDefault();}
function dp(e){e.preventDefault();var fr=e.dataTransfer.getData('text'),to=e.currentTarget.getAttribute('data-n');if(!fr||fr===to)return;pendR={fr:fr,to:to};render();}
function applyR(){var cf=DATA.budget.find(function(x){return x.name===pendR.fr;});var mx=bAvail(cf);var v=+document.getElementById('ramt').value||0;if(cur==='thb')v=v/FX();v=Math.max(0,Math.min(mx,v));if(v>0){REALLOC[pendR.fr]=(REALLOC[pendR.fr]||0)-v;REALLOC[pendR.to]=(REALLOC[pendR.to]||0)+v;RLOG.unshift(f(v)+' : '+pendR.fr+' → '+pendR.to);}pendR=null;render();}
function cancelR(){pendR=null;render();}
function budg(){
 const el=per==='month'?(29/30):(180/365),mEl=6;let sumB=0,h='';
 h+='<div style="display:flex;gap:6px;margin-bottom:0.7rem;"><button onclick="setPer(\'month\')" style="flex:1;border:0.5px solid '+(per==='month'?'var(--acc)':'var(--bd)')+';background:'+(per==='month'?'var(--bgacc)':'transparent')+';color:'+(per==='month'?'var(--tacc)':'var(--ts)')+';padding:8px;border-radius:8px;font-size:14px;font-weight:600;">THIS MONTH</button><button onclick="setPer(\'year\')" style="flex:1;border:0.5px solid '+(per==='year'?'var(--acc)':'var(--bd)')+';background:'+(per==='year'?'var(--bgacc)':'transparent')+';color:'+(per==='year'?'var(--tacc)':'var(--ts)')+';padding:8px;border-radius:8px;font-size:14px;font-weight:600;">WHOLE YEAR</button></div>';
 h+='<div style="display:flex;gap:12px;font-size:10px;color:var(--tm);margin-bottom:6px;"><span>'+dot('G')+'on track</span><span>'+dot('Y')+'watch</span><span>'+dot('R')+'over</span></div>';
 h+='<div style="font-size:11px;color:var(--tm);background:var(--s1);border-radius:8px;padding:6px 10px;margin-bottom:8px;">↔ Drag the ⠿ handle on any <b>flexible</b> or <b>savings</b> line onto another to move money between them. Fixed bills and allowances cannot be moved.</div>';
 if(pendR){h+='<div style="background:var(--bgacc);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;color:var(--tacc);">move</span><input id="ramt" type="number" value="'+(cur==='usd'?50:1650)+'" style="width:84px;padding:4px;"/><span style="font-size:13px;color:var(--tacc);">from <b>'+pendR.fr+'</b> → <b>'+pendR.to+'</b></span><button onclick="applyR()" style="margin-left:auto;border:0.5px solid var(--acc);background:var(--bgacc);color:var(--tacc);padding:5px 11px;border-radius:6px;">Apply</button><button onclick="cancelR()" style="border:0.5px solid var(--bd);background:transparent;color:var(--ts);padding:5px 11px;border-radius:6px;">Cancel</button></div>';}
 DATA.budget.forEach(c=>{const bud=per==='year'?c.mo*12:c.mo;sumB+=bud;let hcv,txt;
  if(c.type==='save'){const aside=per==='year'?c.mo*mEl:c.mo;hcv='G';txt=f(aside)+' set aside '+(per==='month'?'this month':'so far')+' of '+f(bud)+' ✓ on schedule';}
  else{const sp=per==='year'?c.yr_spent:c.mo_spent;const pct=bud>0?sp/bud:0;hcv=(c.type==='flex'||c.type==='her')?(pct>1?'R':(pct>el+0.05?'Y':'G')):'G';txt=f(sp)+' of '+f(bud)+' '+(per==='month'?'this month':'this year')+(pct>1?' · OVER by '+f(sp-bud):' · '+f(bud-sp)+' left');}
  const tc={flex:'#3B6D11',fixed:'#5F5E5A',save:'#185FA5',her:'#534AB7'}[c.type],tg={flex:'flexible',fixed:'fixed',save:'savings',her:'allowance'}[c.type];
  const av=bAvail(c),drag=av!=null;
  h+='<div '+(drag?'draggable="true" data-n="'+c.name.replace(/"/g,'')+'" ondragstart="ds(event)" ondragover="dpv(event)" ondrop="dp(event)" ':'')+'style="padding:6px 0;border-bottom:0.5px solid var(--bd);'+(drag?'cursor:grab;':'')+'"><div style="display:flex;justify-content:space-between;font-size:13px;"><span>'+(drag?'<span style="color:var(--tm);">⠿</span> ':'')+dot(hcv)+c.name+'</span><span style="font-size:10px;background:var(--s0);color:'+tc+';padding:2px 6px;border-radius:8px;">'+tg+'</span></div><div style="font-size:11px;color:'+(hcv==='R'?'var(--td)':'var(--tm)')+';margin-left:13px;">'+txt+(drag?' · <b style="color:var(--tacc);">can move '+f(av)+'</b>':'')+'</div></div>';});
 h+='<div style="display:flex;justify-content:space-between;border-top:0.5px solid var(--tp);padding-top:8px;margin-top:6px;font-size:14px;font-weight:600;"><span>Total budget '+(per==='month'?'this month':'this year')+'</span><span>'+f(sumB)+'</span></div>';
 if(RLOG.length){h+=hd('Money moved (planning)');RLOG.forEach(l=>{h+='<div style="font-size:12px;color:var(--ts);padding:4px 0;border-bottom:0.5px solid var(--bd);">↔ '+l+'</div>';});h+='<div style="font-size:11px;color:var(--tm);margin-top:4px;">Shown here for planning. The phone app saves these permanently to the shared file.</div>';}
 h+=hd('Last 10 expenses logged (check these are right)');
 DATA.last10.forEach(e=>{const odd=e.memo.indexOf('⚠')>=0;h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--bd);font-size:12px;'+(odd?'background:var(--bgw);':'')+'"><span style="color:var(--ts);">'+e.date+' · '+e.memo+'</span><span style="font-weight:600;">'+f(e.thb/FX())+'</span></div>';});
 h+='<div style="font-size:11px;color:var(--tm);margin-top:6px;">⚠ = looks mis-filed. Tell Matt to fix the category.</div>';
 return h;
}
function fc(){
 const m=DATA.forecast,bals=m.map(x=>x[1]),mn=Math.min.apply(null,bals)-1500,mx=Math.max.apply(null,bals);
 let h='<div style="font-size:13px;color:var(--ts);margin-bottom:8px;">Will we reach year-end without running out? <b style="color:var(--tsu);">Yes '+dot('G')+'</b></div><div style="display:flex;gap:6px;align-items:flex-end;">';
 h+=m.map(x=>{const ht=20+Math.round((x[1]-mn)/(mx-mn)*70);const p=x[0]==='Sep';return '<div style="flex:1;text-align:center;"><div style="height:'+ht+'px;background:'+(p?'#BA7517':'#1D9E75')+';border-radius:4px 4px 0 0;"></div><div style="font-size:11px;margin-top:3px;'+(p?'color:var(--tw);font-weight:600;':'color:var(--ts);')+'">'+x[0]+'</div></div>';}).join('');
 h+='</div><div style="font-size:12px;color:var(--tm);margin-top:10px;line-height:1.6;">'+dot('Y')+' <b>September</b> is tight (taxes + construction + medical together) but we have enough. Always keep the Thai bank above ฿400,000 for the visa.</div>';
 return h;
}
function loans(){
 const g=DATA.loans.reduce((s,l)=>s+l.thb,0);
 let h='<div style="font-size:13px;color:var(--ts);margin-bottom:8px;">Money people owe <b>you</b> — '+f(g/FX())+' out, <b>not</b> in your pocket.</div>';
 h+=DATA.loans.map(l=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span>'+dot(l.risk)+l.name+' <span style="font-size:11px;color:var(--tm);">'+l.note+'</span></span><span><span style="font-weight:600;">'+f(l.thb/FX())+'</span> <span style="font-size:11px;color:'+(HC[l.risk]||'#888')+';">'+l.risk+'</span></span></div>').join('');
 return h;
}
function fxtab(){
 const x=DATA.fx||{};
 const dec=(x.decision||'MONITOR').toUpperCase();
 const dcol=dec==='TRANSFER'?'#A32D2D':(dec==='STAGE'?'#BA7517':'#1D9E75');
 const declabel=dec==='TRANSFER'?'SEND NOW':(dec==='STAGE'?'READY — holding':'just watching');
 const live=x.live_rate||0, tgt=x.target_rate||0, fav=live>=tgt;
 let h=hd('Moving money USA → Thailand');
 h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem;">';
 h+='<div style="background:var(--s1);border-radius:8px;padding:0.9rem;"><div style="font-size:12px;color:var(--ts);">action now</div><div style="font-size:20px;font-weight:600;color:'+dcol+';">'+declabel+'</div><div style="font-size:11px;color:var(--tm);">FX engine</div></div>';
 h+='<div style="background:var(--s1);border-radius:8px;padding:0.9rem;"><div style="font-size:12px;color:var(--ts);">rate now</div><div style="font-size:20px;font-weight:600;">'+live.toFixed(2)+'</div><div style="font-size:11px;color:var(--tm);">฿ per $1</div></div>';
 h+='<div style="background:var(--s1);border-radius:8px;padding:0.9rem;"><div style="font-size:12px;color:var(--ts);">ready to send</div><div style="font-size:20px;font-weight:600;">'+f(x.staged_usd||0)+'</div><div style="font-size:11px;color:var(--tm);">staged on Wise</div></div>';
 h+='</div>';
 h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span>'+dot(fav?'G':'Y')+'send-when rate (target)</span><span>'+tgt.toFixed(2)+' · now '+live.toFixed(2)+(fav?' ✓ favorable':' — waiting')+'</span></div>';
 h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bd);font-size:13px;"><span>'+dot((x.runway_mo||0)<1.5?'Y':'G')+'Thai bank runway</span><span>~'+(x.runway_mo||0).toFixed(1)+' months above ฿400k floor</span></div>';
 h+='<div style="background:var(--bgw);border-radius:10px;padding:10px 12px;margin-top:1rem;font-size:12px;color:var(--tw);line-height:1.6;">USAA dollars → Wise → Bangkok Bank baht. Send when the rate is good <b>and</b> the Thai bank is getting low — it drains in about a month, so it needs topping up roughly monthly to stay above the ฿400,000 visa floor.</div>';
 return h;
}
function render(){document.getElementById('view').innerHTML=({overview:ov,budget:budg,fx:fxtab,forecast:fc,loans:loans})[tab]();}
// --- native app + direct-open data hooks (added for Money iOS app, 20260630) ---
function __apply(obj){try{if(typeof obj==='string')obj=JSON.parse(obj);if(obj&&obj.budget){DATA=obj;var el=document.getElementById('live');if(el)el.textContent='live · updated '+(DATA.as_of||'');drawNav();render();return true;}}catch(e){}return false;}
window.__applyFromNative=function(obj){return __apply(obj);};
async function loadLiveFetch(){try{const r=await fetch('./EXPN-state-dashboard.json',{cache:'no-store'});const obj=await r.json();if(!__apply(obj))throw 0;}catch(e){var el=document.getElementById('live');if(el)el.textContent='snapshot · '+(BAKED.as_of||'');}}
async function loadLive(){
 try{
  const r=await window.cowork.callMcpTool('mcp__desktop-commander__read_file',{path:'/Users/matthewchambers/Documents/Claude/EXPN-state-dashboard.json'});
  let obj=null;
  if(r&&r.structuredContent&&r.structuredContent.budget)obj=r.structuredContent;
  else{let t=(r&&r.structuredContent&&r.structuredContent.content)||(r&&r.content&&r.content[0]&&r.content[0].text)||'';const i=t.indexOf('{');if(i>=0)obj=JSON.parse(t.slice(i));}
  if(obj&&obj.budget){DATA=obj;document.getElementById('live').textContent='live · updated '+(DATA.as_of||'');render();}
 }catch(e){document.getElementById('live').textContent='snapshot · '+(BAKED.as_of||'');}
}
// ---- client-side decryption (hosted PWA): data is AES-GCM ciphertext ----
const PASS_KEY='moneyPass';
function b64ToBytes(b64){const s=atob(b64.trim());const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function deriveKey(pass,salt){const enc=new TextEncoder();const base=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:250000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);}
async function decryptDashboard(pass){const r=await fetch('EXPN-state-dashboard.enc',{cache:'no-store'});if(!r.ok)throw new Error('no data file');const blob=b64ToBytes(await r.text());const salt=blob.slice(0,16),iv=blob.slice(16,28),ct=blob.slice(28);const key=await deriveKey(pass,salt);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);return JSON.parse(new TextDecoder().decode(pt));}
function hideLock(){var o=document.getElementById('lockov');if(o)o.remove();}
function lockUI(msg){var o=document.getElementById('lockov');if(!o){o=document.createElement('div');o.id='lockov';o.style.cssText='position:fixed;inset:0;background:#1D9E75;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;text-align:center;';o.innerHTML='<div style="font-size:30px;font-weight:700;">Money</div><div style="font-size:14px;opacity:.9;">Enter the household passphrase</div><input id="lockpw" type="password" autocomplete="current-password" style="font-size:17px;padding:11px 13px;border:0;border-radius:10px;width:80%;max-width:280px;text-align:center;"/><label style="font-size:12px;opacity:.9;"><input id="lockrem" type="checkbox" checked> remember on this phone</label><button id="lockbtn" style="font-size:16px;font-weight:600;padding:10px 22px;border:0;border-radius:10px;background:#fff;color:#185fa5;">Unlock</button><div id="lockerr" style="font-size:12px;color:#ffeded;min-height:16px;"></div>';document.body.appendChild(o);document.getElementById('lockbtn').onclick=doUnlock;document.getElementById('lockpw').addEventListener('keydown',function(e){if(e.key==='Enter')doUnlock();});}var er=document.getElementById('lockerr');if(er)er.textContent=msg||'';var pf=document.getElementById('lockpw');if(pf)pf.focus();}
async function doUnlock(){var pw=document.getElementById('lockpw').value;var rem=document.getElementById('lockrem').checked;document.getElementById('lockerr').textContent='unlocking…';try{var obj=await decryptDashboard(pw);if(rem){try{localStorage.setItem(PASS_KEY,pw);}catch(e){}}__apply(obj);hideLock();}catch(e){try{localStorage.removeItem(PASS_KEY);}catch(_){}lockUI('Wrong passphrase — try again.');}}
async function refreshData(){var el=document.getElementById('live');var saved=null;try{saved=localStorage.getItem(PASS_KEY);}catch(e){}if(!saved){lockUI('');return;}if(el)el.textContent='refreshing…';try{var obj=await decryptDashboard(saved);__apply(obj);}catch(e){if(el)el.textContent='refresh failed — tap ⟳';}}
async function bootEncrypted(){var saved=null;try{saved=localStorage.getItem(PASS_KEY);}catch(e){}if(saved){try{var obj=await decryptDashboard(saved);__apply(obj);return;}catch(e){try{localStorage.removeItem(PASS_KEY);}catch(_){}}}lockUI('');}
drawNav();render();
if(window.cowork&&window.cowork.callMcpTool){loadLive();}
else if(window.__NATIVE_INJECT__){/* native app injects via __applyFromNative */}
else{bootEncrypted();}
// when running inside the Money native app, window.__NATIVE_INJECT__ is set true
// at document-start and the app calls window.__applyFromNative(json) after load.
// PWA service worker (offline = last cached data)
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
